# ==============================
# LinguistAI — Dev Inventory
# ==============================
# Uses AWS EC2 dynamic inventory plugin
# Requires: pip install boto3

plugin: amazon.aws.aws_ec2
regions:
  - ap-south-1

filters:
  tag:Project: linguistai
  tag:Environment: dev
  instance-state-name: running

keyed_groups:
  - key: tags.Role
    prefix: role
  - key: tags.Environment
    prefix: env

hostnames:
  - private-ip-address

compose:
  ansible_user: "'ec2-user'"
  ansible_ssh_private_key_file: "'~/.ssh/linguistai-dev.pem'"
