apiVersion: apps/v1
kind: Deployment
metadata:
  name: linguistai-server
  namespace: linguistai
  labels:
    app: linguistai
    component: server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: linguistai
      component: server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: linguistai
        component: server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: linguistai-server
      containers:
        - name: server
          image: server:latest  # Replaced by Kustomize
          ports:
            - containerPort: 5000
              name: http
          envFrom:
            - secretRef:
                name: linguistai-secrets
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "5000"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
      restartPolicy: Always
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: linguistai-server
  namespace: linguistai
  labels:
    app: linguistai
    component: server
