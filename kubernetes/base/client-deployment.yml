apiVersion: apps/v1
kind: Deployment
metadata:
  name: linguistai-client
  namespace: linguistai
  labels:
    app: linguistai
    component: client
spec:
  replicas: 2
  selector:
    matchLabels:
      app: linguistai
      component: client
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: linguistai
        component: client
    spec:
      containers:
        - name: client
          image: client:latest  # Replaced by Kustomize
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /nginx-health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /nginx-health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      restartPolicy: Always
