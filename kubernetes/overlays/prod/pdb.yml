apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: linguistai-server-pdb
  namespace: linguistai
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: linguistai
      component: server
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: linguistai-client-pdb
  namespace: linguistai
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: linguistai
      component: client
