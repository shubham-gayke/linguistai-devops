# ==============================
# LinguistAI — Development Docker Compose
# ==============================
# Usage: docker compose up -d
# ==============================

services:
  # ==============================
  # Backend Server (Node.js)
  # ==============================
  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: linguistai-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    volumes:
      - ./server:/app
      - /app/node_modules
    networks:
      - linguistai-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # ==============================
  # Frontend Client (React/Vite)
  # ==============================
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: linguistai-client
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      server:
        condition: service_healthy
    networks:
      - linguistai-network

# ==============================
# Networks
# ==============================
networks:
  linguistai-network:
    driver: bridge
    name: linguistai-network
