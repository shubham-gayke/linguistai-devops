# ==============================
# LinguistAI — CI Pipeline
# ==============================
# Triggers on push/PR to main and dev branches
# Stages: Lint → Test → SonarQube → Build → Trivy Scan → Push to ECR
# ==============================

name: CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com
  SERVER_IMAGE: linguistai-server
  CLIENT_IMAGE: linguistai-client

jobs:
  # ==============================
  # Stage 1: Lint
  # ==============================
  lint:
    name: 🔍 Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install server dependencies
        run: cd server && npm ci

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Lint server
        run: cd server && npm run lint || true

      - name: Lint client
        run: cd client && npm run lint || true

  # ==============================
  # Stage 2: Test
  # ==============================
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: cd server && npm ci

      - name: Run tests with coverage
        run: cd server && npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: server/coverage/

  # ==============================
  # Stage 3: SonarQube Scan
  # ==============================
  sonar:
    name: 📊 SonarQube Analysis
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: server/coverage/

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ==============================
  # Stage 4: Build & Push Docker Images
  # ==============================
  build-and-push:
    name: 🐳 Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: echo "TAG=$(echo $GITHUB_SHA | head -c 7)" >> $GITHUB_OUTPUT

      # --- Build Server Image ---
      - name: Build server image
        run: |
          docker build \
            -t ${{ env.ECR_REGISTRY }}/${{ env.SERVER_IMAGE }}:${{ steps.tag.outputs.TAG }} \
            -t ${{ env.ECR_REGISTRY }}/${{ env.SERVER_IMAGE }}:latest \
            -f server/Dockerfile \
            ./server

      # --- Build Client Image ---
      - name: Build client image
        run: |
          docker build \
            -t ${{ env.ECR_REGISTRY }}/${{ env.CLIENT_IMAGE }}:${{ steps.tag.outputs.TAG }} \
            -t ${{ env.ECR_REGISTRY }}/${{ env.CLIENT_IMAGE }}:latest \
            -f client/Dockerfile \
            ./client

      # --- Trivy Security Scan ---
      - name: Trivy scan - Server
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.ECR_REGISTRY }}/${{ env.SERVER_IMAGE }}:${{ steps.tag.outputs.TAG }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Trivy scan - Client
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.ECR_REGISTRY }}/${{ env.CLIENT_IMAGE }}:${{ steps.tag.outputs.TAG }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      # --- Push to ECR ---
      - name: Push server image to ECR
        run: |
          docker push ${{ env.ECR_REGISTRY }}/${{ env.SERVER_IMAGE }}:${{ steps.tag.outputs.TAG }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.SERVER_IMAGE }}:latest

      - name: Push client image to ECR
        run: |
          docker push ${{ env.ECR_REGISTRY }}/${{ env.CLIENT_IMAGE }}:${{ steps.tag.outputs.TAG }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.CLIENT_IMAGE }}:latest

    outputs:
      image-tag: ${{ steps.tag.outputs.TAG }}
