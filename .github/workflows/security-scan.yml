# ==============================
# LinguistAI — Weekly Security Scan
# ==============================
# Runs every Monday at 6:00 AM UTC
# Scans dependencies and Docker images for vulnerabilities
# ==============================

name: Security Scan

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6 AM UTC
  workflow_dispatch:  # Allow manual trigger

env:
  AWS_REGION: ap-south-1

jobs:
  # ==============================
  # Dependency Audit
  # ==============================
  dependency-audit:
    name: 🔒 Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Audit server dependencies
        run: |
          echo "## Server Dependencies" >> $GITHUB_STEP_SUMMARY
          cd server && npm audit --production 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true

      - name: Audit client dependencies
        run: |
          echo "## Client Dependencies" >> $GITHUB_STEP_SUMMARY
          cd client && npm audit --production 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true

  # ==============================
  # Container Image Scan
  # ==============================
  image-scan:
    name: 🐳 Container Image Scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - context: ./server
            dockerfile: server/Dockerfile
            image-name: linguistai-server
          - context: ./client
            dockerfile: client/Dockerfile
            image-name: linguistai-client
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build \
            -t ${{ matrix.image-name }}:scan \
            -f ${{ matrix.dockerfile }} \
            ${{ matrix.context }}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ matrix.image-name }}:scan'
          format: 'sarif'
          output: 'trivy-${{ matrix.image-name }}.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-${{ matrix.image-name }}.sarif'

  # ==============================
  # OWASP Dependency Check
  # ==============================
  owasp-check:
    name: 🛡️ OWASP Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'linguistai'
          path: '.'
          format: 'HTML'
          args: >
            --enableExperimental
            --exclude "**/node_modules/**"

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: reports/

  # ==============================
  # Secret Scanning
  # ==============================
  secret-scan:
    name: 🔑 Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
