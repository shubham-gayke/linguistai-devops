sonar.projectKey=shubham-gayke_linguistai-devops
sonar.organization=shubham-gayke
sonar.projectName=LinguistAI
sonar.projectVersion=1.0.0
# Source directories
sonar.sources=server/src,client/src

# Test directories
sonar.tests=server/src/__tests__

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/*.test.js,**/*.spec.js

# JavaScript/TypeScript
sonar.javascript.lcov.reportPaths=server/coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8

# Coverage exclusions
sonar.coverage.exclusions=**/*.test.js,**/*.spec.js,**/scripts/**,**/__tests__/**
