# ==============================
# LinguistAI — Production Docker Compose
# ==============================
# Usage: docker compose -f docker-compose.prod.yml up -d --build
# ==============================

services:
  # ==============================
  # Backend Server (Node.js)
  # ==============================
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: linguistai-server-prod
    restart: always
    expose:
      - "5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    networks:
      - linguistai-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # ==============================
  # Frontend Client (Nginx)
  # ==============================
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: linguistai-client-prod
    restart: always
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - linguistai-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/nginx-health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

# ==============================
# Networks
# ==============================
networks:
  linguistai-network:
    driver: bridge
    name: linguistai-network-prod
