# ==============================
# Trivy Scanner Configuration
# ==============================

severity:
  - CRITICAL
  - HIGH

# Exit with error if vulnerabilities found
exit-code: 1

# Ignore unfixed vulnerabilities
ignore-unfixed: true

# Vulnerability types to scan
vuln-type:
  - os
  - library

# Security checks to perform
security-checks:
  - vuln
  - config
  - secret

# Output format
format: table

# Ignored vulnerabilities (add known false positives here)
# ignorefile: .trivyignore
